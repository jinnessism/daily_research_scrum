name: Daily Market & Research Report

on:
  schedule:
    - cron: '0 23 * * *'  # KST 08:00 (UTC 23:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  market-report:
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🕐 Set timezone to KST
        run: |
          sudo timedatectl set-timezone Asia/Seoul
          date

      - name: 🚀 Run market report bot
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python main.py

      - name: 💾 Commit DB cache back to repo
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add db/
          git diff --staged --quiet || git commit -m "chore: update DB cache [skip ci]"
          git push

      - name: 📊 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-bot-logs
          path: market_bot.log
          retention-days: 7

      - name: 🔔 Notify on failure
        if: failure()
        run: |
          echo "❌ Market bot execution failed"
          echo "Check logs for details"
